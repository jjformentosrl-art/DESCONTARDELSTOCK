<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formento — Descontar del Stock</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1D4E89;
    --blue-dark: #163a6a;
    --blue-light: #4A90D9;
    --cream: #FAF7F2;
    --dark: #1A1A1A;
    --gray: #6B6B6B;
    --gray-light: #E8E3DC;
    --white: #FFFFFF;
    --green: #2D6A4F;
    --green-light: #52B788;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "DM Sans", sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }

  header {
    background: #000000;
    padding: 0 24px; display: flex; align-items: center;
    justify-content: center; height: 68px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--blue);
    box-shadow: 0 2px 16px rgba(0,0,0,0.3);
  }
  header img { height: 50px; object-fit: contain; }

  .wrap { max-width: 640px; margin: 0 auto; padding: 32px 20px 60px; }
  .page-title { font-family: "Bebas Neue", sans-serif; font-size: 2.2rem; letter-spacing: 2px; margin-bottom: 4px; }
  .page-subtitle { font-size: 0.9rem; color: var(--gray); margin-bottom: 32px; }

  .card { background: var(--white); border-radius: 12px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
  .card-title { font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--blue); margin-bottom: 16px; }

  label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--dark); margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-light);
    border-radius: 8px; font-family: "DM Sans", sans-serif; font-size: 0.95rem;
    color: var(--dark); background: var(--cream); outline: none;
    transition: border-color 0.2s; margin-bottom: 16px;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--blue); background: var(--white); }
  textarea { resize: vertical; min-height: 80px; }

  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-wrap input { margin-bottom: 0; padding-right: 40px; }
  .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--gray); pointer-events: none; }

  .suggestions {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--white); border: 1.5px solid var(--gray-light);
    border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 50; max-height: 240px; overflow-y: auto; display: none;
  }
  .suggestions.open { display: block; }
  .suggestion-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--gray-light); transition: background 0.15s; }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--cream); }
  .sug-code { font-size: 0.75rem; font-weight: 600; color: var(--blue); margin-bottom: 2px; }
  .sug-desc { font-size: 0.88rem; color: var(--dark); }
  .no-results { padding: 14px; text-align: center; color: var(--gray); font-size: 0.85rem; }

  .selected-product { background: #EEF4FC; border: 1.5px solid var(--blue); border-radius: 8px; padding: 12px 14px; margin-top: 10px; display: none; }
  .selected-product.show { display: block; }
  .sp-code { font-size: 0.75rem; font-weight: 600; color: var(--blue); }
  .sp-desc { font-size: 1rem; font-weight: 500; }

  .qty-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

  .motivo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .motivo-btn {
    padding: 11px 8px; border: 1.5px solid var(--gray-light); border-radius: 8px;
    background: var(--cream); font-family: "DM Sans", sans-serif; font-size: 0.82rem;
    color: var(--dark); cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .motivo-btn:hover { border-color: var(--blue); }
  .motivo-btn.selected { border-color: var(--blue); background: #EEF4FC; color: var(--blue); font-weight: 600; }

  .btn-primary {
    width: 100%; padding: 14px; background: var(--blue); color: var(--white);
    border: none; border-radius: 8px; font-family: "DM Sans", sans-serif;
    font-size: 1rem; font-weight: 600; cursor: pointer; letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { background: var(--gray); cursor: not-allowed; opacity: 0.7; }

  /* Loading spinner */
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Success */
  .success-screen { text-align: center; padding: 60px 20px; display: none; }
  .success-screen.show { display: block; }
  .success-icon { font-size: 4rem; margin-bottom: 16px; }
  .success-screen h2 { font-family: "Bebas Neue", sans-serif; font-size: 2rem; letter-spacing: 2px; color: var(--green); margin-bottom: 8px; }
  .success-screen p { color: var(--gray); margin-bottom: 28px; }
  .btn-secondary {
    padding: 12px 28px; background: none; color: var(--blue); border: 2px solid var(--blue);
    border-radius: 8px; font-family: "DM Sans", sans-serif; font-size: 0.95rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--blue); color: var(--white); }

  /* Error banner */
  .error-banner {
    background: #FEE2E2; border: 1px solid #FECACA; border-radius: 8px;
    padding: 12px 16px; margin-bottom: 16px; font-size: 0.88rem; color: #991B1B;
    display: none;
  }
  .error-banner.show { display: block; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dark); color: var(--white);
    padding: 12px 24px; border-radius: 8px; font-size: 0.9rem;
    font-weight: 500; z-index: 999; transition: transform 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #DC2626; }
  .toast.success { background: var(--green); }

  @media (max-width: 600px) {
    .qty-row { grid-template-columns: 1fr; gap: 0; }
    .motivo-grid { grid-template-columns: 1fr; }
    header { padding: 0 16px; }
  }
</style>
</head>

<div class="wrap">
  <div id="form-area">
    <h1 class="page-title">DESCONTAR DEL STOCK</h1>
    <p class="page-subtitle">Completá el formulario para dar de baja mercadería dañada o mal empaquetada.</p>

    <div class="error-banner" id="error-banner">⚠️ <span id="error-msg"></span></div>

    <!-- Empleado -->
    <div class="card">
      <div class="card-title">👤 Datos del empleado</div>
      <label for="emp-select">Seleccioná tu nombre</label>
      <select id="emp-select" style="margin-bottom:0;">
        <option value="">— Elegí tu nombre —</option>
      </select>
    </div>

    <!-- Producto -->
    <div class="card">
      <div class="card-title">🔍 Producto dañado</div>
      <label>Buscar por código o descripción</label>
      <div class="search-wrap">
        <input type="text" id="product-search" placeholder="Ej: 15155, alfajor, bombón..." autocomplete="off" style="margin-bottom:0;">
        <span class="search-icon">🔍</span>
        <div class="suggestions" id="suggestions-list"></div>
      </div>
      <div class="selected-product" id="selected-product">
        <div class="sp-code" id="sel-code"></div>
        <div class="sp-desc" id="sel-desc"></div>
      </div>
    </div>

    <!-- Detalle -->
    <div class="card">
      <div class="card-title">📋 Detalle del daño</div>
      <div class="qty-row">
        <div>
          <label for="qty">Cantidad dañada</label>
          <input type="number" id="qty" placeholder="Ej: 3" min="1" style="margin-bottom:0;">
        </div>
        <div>
          <label for="unit">Unidad</label>
          <select id="unit" style="margin-bottom:0;">
            <option value="Unidad">Unidad</option>
            <option value="Display">Display</option>
            <option value="Bulto">Bulto</option>
          </select>
        </div>
      </div>
      <div style="height:16px;"></div>
      <label>Motivo del daño</label>
      <div class="motivo-grid">
        <button class="motivo-btn" onclick="selectMotivo(this)">📦 Mal empaquetado</button>
        <button class="motivo-btn" onclick="selectMotivo(this)">🥫 Abollado</button>
        <button class="motivo-btn" onclick="selectMotivo(this)">📅 Fecha vencida</button>
        <button class="motivo-btn" onclick="selectMotivo(this)">🐜 Plaga / contaminado</button>
        <button class="motivo-btn" onclick="selectMotivo(this)">💧 Mojado / húmedo</button>
        <button class="motivo-btn" onclick="selectMotivo(this)">✏️ Otros</button>
      </div>
      <label for="obs">Observaciones adicionales (opcional)</label>
      <textarea id="obs" placeholder="Cualquier detalle extra que quieras agregar..." style="margin-bottom:0;"></textarea>
    </div>

    <button class="btn-primary" id="submit-btn" onclick="submitReport()">ENVIAR REPORTE</button>

  empSelect.appendChild(opt);
});

// ─── BÚSQUEDA DE PRODUCTOS ───
const searchInput = document.getElementById('product-search');
const suggList = document.getElementById('suggestions-list');
let selectedProductData = null;

searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  selectedProductData = null;
  document.getElementById('selected-product').classList.remove('show');
  if (q.length < 2) { suggList.classList.remove('open'); return; }

  const results = PRODUCTS.filter(function(p) {
    return p.code.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
  }).slice(0, 10);

  suggList.innerHTML = '';
  if (results.length === 0) {
    suggList.innerHTML = '<div class="no-results">No se encontraron productos</div>';
    suggList.classList.add('open');
    return;
  }
  results.forEach(function(p) {
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.innerHTML = '<div class="sug-code">' + p.code + '</div><div class="sug-desc">' + p.desc + '</div>';
    div.addEventListener('click', function() { selectProduct(p.code, p.desc); });
    suggList.appendChild(div);
  });
  suggList.classList.add('open');
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) suggList.classList.remove('open');
});

function selectProduct(code, desc) {
  selectedProductData = { code: code, desc: desc };
  searchInput.value = desc;
  suggList.classList.remove('open');
  document.getElementById('sel-code').textContent = code;
  document.getElementById('sel-desc').textContent = desc;
  document.getElementById('selected-product').classList.add('show');
}

// ─── MOTIVO ───
let selectedMotivo = null;
function selectMotivo(btn) {
  document.querySelectorAll('.motivo-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  selectedMotivo = btn.textContent.replace(/^\S+\s/, '').trim();
}

// ─── ENVIAR REPORTE ───
function submitReport() {
  const name = document.getElementById('emp-select').value;
  const qty = document.getElementById('qty').value;
  const unit = document.getElementById('unit').value;
  const obs = document.getElementById('obs').value.trim();
  const errorBanner = document.getElementById('error-banner');
  const errorMsg = document.getElementById('error-msg');

  errorBanner.classList.remove('show');

  if (!name) { showError('Seleccioná tu nombre.'); return; }
  if (!selectedProductData) { showError('Buscá y seleccioná un producto de la lista.'); return; }
  if (!qty || parseInt(qty) < 1) { showError('Ingresá una cantidad válida.'); return; }
  if (!selectedMotivo) { showError('Seleccioná el motivo del daño.'); return; }

  if (APPS_SCRIPT_URL === "PEGAR_URL_AQUI") {
    showToast('⚠️ Configurá la URL del Apps Script primero', 'error');
    return;
  }

  const now = new Date();
  const fecha = now.toLocaleDateString('es-AR');
  const hora = now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });

  const data = {
    fecha: fecha,
    hora: hora,
    empleado: name,
    codigo: selectedProductData.code,
    producto: selectedProductData.desc,
    cantidad: qty,
    unidad: unit,
    motivo: selectedMotivo,
    observaciones: obs || ''
  };

  // Deshabilitar botón y mostrar loading
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Enviando...';

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(function() {
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('success-screen').classList.add('show');
  })
  .catch(function(err) {
    showError('Error al enviar. Verificá tu conexión e intentá de nuevo.');
    btn.disabled = false;
    btn.innerHTML = 'ENVIAR REPORTE';
  });
}

function showError(msg) {
  const banner = document.getElementById('error-banner');
  document.getElementById('error-msg').textContent = msg;
  banner.classList.add('show');
  banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetForm() {
  document.getElementById('form-area').style.display = 'block';
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('emp-select').value = '';
  document.getElementById('product-search').value = '';
  document.getElementById('selected-product').classList.remove('show');
  document.getElementById('qty').value = '';
  document.getElementById('obs').value = '';
  document.querySelectorAll('.motivo-btn').forEach(function(b) { b.classList.remove('selected'); });
  document.getElementById('error-banner').classList.remove('show');
  const btn = document.getElementById('submit-btn');
  btn.disabled = false;
  btn.innerHTML = 'ENVIAR REPORTE';
  selectedProductData = null;
  selectedMotivo = null;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(function() { t.className = 'toast'; }, 3000);
}
